{{- if .Values.networkPolicies.enabled }}
# This NetworkPolicy only allows internal ingress between Loki pods and denies all other ingress.
# Dependent Dogus and Components must bring their own NetworkPolicy to access Loki.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "k8s-loki-internal-ingress"
  namespace: {{ $.Release.Namespace }}
  labels:
    app: ces
    app.kubernetes.io/name: k8s-loki
spec:
  podSelector:
    matchLabels:
      app: ces
      app.kubernetes.io/name: k8s-loki
  policyTypes:
    - Ingress
  ingress:
    # Rule 1: Allow internal Loki traffic
    - from:
        - podSelector:
            matchLabels:
              app: ces
              app.kubernetes.io/name: k8s-loki
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
    # Rule 2: Allow Grafana traffic specifically on port 3100
    - from:
        - podSelector:
            matchLabels:
              app: ces
              dogu.name: grafana
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
      ports:
        - protocol: TCP
          port: 3100
{{- end}}